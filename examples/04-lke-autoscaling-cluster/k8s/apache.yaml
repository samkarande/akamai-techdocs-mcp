# Apache HTTP Server — Deployment + LoadBalancer Service
#
# 2 replicas spread across 2 nodes (1 per node) via topologySpreadConstraints.
# Each pod generates its index.html at startup using shell + env vars from
# the Kubernetes Downward API, showing version, pod name, and pod IP.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  labels:
    app: apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: apache
      containers:
        - name: apache
          image: httpd:2.4
          ports:
            - containerPort: 80
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          command: ["/bin/sh", "-c"]
          args:
            - |
              (
                echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Apache Info</title>'
                echo '<style>'
                echo 'body{font-family:sans-serif;max-width:600px;margin:60px auto;padding:20px;background:#f0f2f5}'
                echo 'h1{color:#c0392b;border-bottom:3px solid #c0392b;padding-bottom:8px}'
                echo 'table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1)}'
                echo 'td{padding:12px 16px;border-bottom:1px solid #eee}'
                echo 'td:first-child{font-weight:bold;background:#fafafa;width:110px}'
                echo '</style></head><body>'
                echo '<h1>Apache HTTP Server</h1>'
                echo '<table>'
                echo "<tr><td>Version</td><td>$(httpd -v 2>&1 | head -1)</td></tr>"
                echo "<tr><td>Pod Name</td><td>$POD_NAME</td></tr>"
                echo "<tr><td>Pod IP</td><td>$POD_IP</td></tr>"
                echo '</table></body></html>'
              ) > /usr/local/apache2/htdocs/index.html
              exec httpd-foreground
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: apache
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "4"
spec:
  type: LoadBalancer
  selector:
    app: apache
  ports:
    - name: http
      port: 80
      targetPort: 80
